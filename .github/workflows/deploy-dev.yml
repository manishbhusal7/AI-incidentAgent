name: Deploy Dev

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - "apps/**"
      - "agent/**"
      - "infra/**"
      - "scripts/**"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ secrets.AWS_ROLE_TO_ASSUME != '' || secrets.AWS_ACCESS_KEY_ID != '' }}
    # Configure repository secrets (GitHub Secrets UI — never commit these):
    #   AWS_ROLE_TO_ASSUME  (OIDC, preferred) OR AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY
    # Anthropic API key: set in AWS SSM SecureString after deploy, not in GitHub.
    env:
      AWS_REGION: us-east-1
      # Anthropic key is NOT stored in the repo. Set it in AWS SSM after deploy:
      # aws ssm put-parameter --name "/ai-incident-triage-agent/dev/anthropic_api_key" ...
      TF_VAR_anthropic_api_key: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Package Lambdas
        shell: bash
        run: |
          mkdir -p infra/build/agent_pkg
          cp -r agent/src/* infra/build/agent_pkg/
          pip install -r agent/requirements.txt -t infra/build/agent_pkg
          (cd infra/build/agent_pkg && zip -r ../agent.zip .)
          (cd apps/loan-processing/src && zip -r ../../../infra/build/loan-processing.zip .)

      - name: Configure AWS credentials (OIDC preferred)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS credentials
        run: aws sts get-caller-identity

      - uses: hashicorp/setup-terraform@v3

      - name: Bootstrap Terraform remote state
        id: tf_state
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          STATE_BUCKET="aita-terraform-state-${ACCOUNT_ID}"
          if ! aws s3api head-bucket --bucket "${STATE_BUCKET}" 2>/dev/null; then
            aws s3api create-bucket --bucket "${STATE_BUCKET}" --region "${AWS_REGION}"
          fi
          aws s3api put-bucket-versioning \
            --bucket "${STATE_BUCKET}" \
            --versioning-configuration Status=Enabled
          echo "bucket=${STATE_BUCKET}" >> "${GITHUB_OUTPUT}"

      - name: Terraform init
        working-directory: infra
        run: |
          terraform init \
            -backend-config="bucket=${{ steps.tf_state.outputs.bucket }}" \
            -backend-config="key=ai-incident-triage-agent/dev/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Adopt existing AWS resources into state
        run: bash scripts/adopt_terraform_state.sh

      - name: Terraform apply
        working-directory: infra
        run: terraform apply -auto-approve -var-file=environments/dev.tfvars

      - name: Write deploy marker to S3
        working-directory: infra
        run: |
          BUCKET=$(terraform output -raw artifacts_bucket)
          SHA=${{ github.sha }}
          cat > /tmp/deploy.json <<EOF
          {
            "version": "${{ github.run_number }}",
            "git_sha": "$SHA",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "change_notes": "${{ github.event.head_commit.message }}",
            "service": "loan-processing",
            "actor": "${{ github.actor }}"
          }
          EOF
          aws s3 cp /tmp/deploy.json "s3://$BUCKET/deploys/$(date -u +%Y%m%d%H%M%S)-$SHA.json"
